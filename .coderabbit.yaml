# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ko-KR"
early_access: false
enable_free_tier: true

reviews:
  profile: "chill"
  high_level_summary: true
  review_status: true
  poem: false
  path_filters:
    - "src/**"
    - "docs/**"
    - "gradle/**"
    - "gradlew"
    - "gradlew.bat"
    - "settings.gradle"
    - "!out/**"
    - "!build/**"
    - "!dist/**"
    - "!node_modules/**"
  auto_review:
    enabled: false
    auto_incremental_review: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local